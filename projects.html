<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homepage Dinh Photography</title>
    <link rel="stylesheet" href="./main_pages.css" />
  </head>
  <body>
    <header>
      <a href="./index.html" class="nav_links">
        <p>Jennifer Dinh</p>
      </a>

      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <nav id="nav">
        <a href="#" class="nav_links" id="contact_link">Contact</a>
        <a href="#" class="nav_links" id="works_link">Works</a>
        <a href="./about.html" class="nav_links">About</a>
        <a href="./index.html" class="nav_links">Home</a>
      </nav>

      <div class="contact_overlay" id="contact_overlay">
        <form class="contact_form" action="#" method="post">
          <button type="button" class="close_btn" id="close_button_form">
            &times;
          </button>

          <div class="form_group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required />
          </div>

          <div class="form_group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />
          </div>

          <div class="form_group">
            <label for="message">Leave a message</label>
            <textarea id="message" name="message" required></textarea>
          </div>

          <button type="submit">Send message</button>
        </form>
      </div>

      <div class="contact_overlay works_overlay" id="works_overlay">
        <div class="content_group">
          <div class="nav_group">
            <a href="./gallery.html" class="nav_links">Gallery</a>
            <a href="./projects.html" class="nav_links">Projects</a>
          </div>

          <ul>
            <li>
              <a href="./project1.html" class="nav_links">Hands & Shape</a>
            </li>
            <li><a href="./project2.html" class="nav_links">Process</a></li>
            <li>
              <a href="./project3.html" class="nav_links">Relationship</a>
            </li>
          </ul>
        </div>
      </div>
    </header>
    <main>
      <div class="hero">
        <h1>Projects</h1>
        <p></p>
      </div>

      <section class="projects section_block">
        <div class="projects-grid">
          <article class="project-card">
            <a href="./project1.html">
              <img
                src="./images/ngoai_ca.JPG"
                alt="Red Basket Holding Fish with Knife"
              />
            </a>
            <h3>Hands & Shapes</h3>
            <p></p>
          </article>
          <article class="project-card off_center">
            <a href="project2.html">
              <img src="./images/bisque.JPG" alt="Bisqued Pottery" />
            </a>
            <h3>Processes</h3>
            <p></p>
          </article>
          <article class="project-card off_center1">
            <a href="project3.html">
              <img src="./images/fish_bw.JPG" alt="Men Harvesting Fish" />
            </a>
            <h3>Relationship</h3>
            <p></p>
          </article>

          <article class="project-card coming-soon">
            <h2>Coming Soon</h2>
            <p>Project in progress.</p>
          </article>
        </div>
      </section>
    </main>

    <footer>
      <div class="social_media">
        <a href="mailto:jenniferdinh38@gmail.com" target="_blank">
          <img src="./images/mail.png" alt="email icon" />
        </a>
        <a href="https://github.com/devbyjen388" target="_blank">
          <img src="./images/github.png" alt="github icon" />
        </a>
        <a href="https://www.instagram.com/" target="_blank">
          <img src="./images/instagram.png" alt="instagram icon" />
        </a>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
