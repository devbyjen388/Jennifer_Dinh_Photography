<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homepage Dinh Photography</title>
    <link rel="stylesheet" href="./main_pages.css" />
  </head>
  <body>
    <header>
      <a href="./index.html" class="nav_links">
        <h2>Jennifer Dinh</h2>
      </a>

      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <nav id="nav">
        <a href="#" class="nav_links" id="contact_link">Contact</a>
        <a href="./works.html" class="nav_links">Works</a>
        <a href="./about.html" class="nav_links">About</a>
        <a href="./index.html" class="nav_links">Home</a>
      </nav>
    </header>

    <main>
      <form action="" method="">
        <div class="contact_overlay" id="contact_overlay">
          <button class="close_btn" id="close_button">&times;</button>

          <label for="name">Name</label>
          <input type="text" id="name" name="name" required />

          <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div>
            <label for="message">Leave a message</label>
            <textarea name="message" id="message" required></textarea>
          </div>
          <button type="submit">Send message</button>
        </div>
      </form>

      <div class="hero">
        <h1>View Works</h1>
        <li>
          <a href="projects.html" class="nav_links">Projects</a>
          <a href="gallery.html" class="nav_links">Gallery</a>
        </li>
      </div>
    </main>
    <footer>
      <div class="social_media">
        <a href="mailto:jenniferdinh38@gmail.com" target="_blank">
          <img src="./images/mail.png" alt="email icon" />
        </a>
        <a href="https://github.com/devbyjen388" target="_blank">
          <img src="./images/github.png" alt="github icon" />
        </a>
        <a href="https://www.instagram.com/" target="_blank">
          <img src="./images/instagram.png" alt="instagram icon" />
        </a>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
